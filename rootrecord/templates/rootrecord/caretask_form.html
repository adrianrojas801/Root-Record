{% extends 'rootrecord/base.html' %}

{% block content %}

<div class="container">

  <h1>Create Care Task</h1>

  <div class="card mt-3">

    <form method="POST">
      {% csrf_token %}

      <div class="mt-2">
        {{ form.as_p }}
      </div>

      <button type="submit" class="mt-3">Create Task</button>
      <a href="{% url 'plant_detail' plant.pk %}" class="button-secondary">Cancel</a>

    </form>

  </div>

</div>

{% endblock %}
