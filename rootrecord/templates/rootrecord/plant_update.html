{% extends 'rootrecord/base.html' %}

{% block content %}

<div class="container">

  <h1>Edit Plant</h1>

  <div class="card mt-3">

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="mt-2">
        {{ form.as_p }}
      </div>

      <!-- Show current image if it exists -->
      {% if form.instance.image_file %}
        <div class="mt-2">
          <p class="muted-text">Current image:</p>
          <img src="{{ form.instance.image_file.url }}" alt="{{ form.instance.nickname }}" 
               style="max-width: 200px; border-radius: var(--radius);">
        </div>
      {% endif %}

      <button type="submit" class="mt-3">Save Changes</button>
      <a href="{% url 'plant_detail' plant.pk %}" class="button-secondary">Cancel</a>
    </form>

  </div>

</div>

{% endblock %}
