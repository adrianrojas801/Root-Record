{% extends 'rootrecord/base.html' %}

{% block content %}

<div class="container">

  <h1>Add New Plant</h1>

  <div class="card mt-3">

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="mt-2">
        {{ form.as_p }}
      </div>

      <button type="submit" class="mt-3">Save</button>
      <a href="{% url 'plant_list' %}" class="button-secondary">Cancel</a>
    </form>

  </div>

</div>

{% endblock %}
