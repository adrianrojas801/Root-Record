{% extends 'rootrecord/base.html' %}

{% block content %}

<div class="container">

  <h1>Delete Care Task</h1>

  <div class="card mt-3">

    <p>Are you sure you want to delete this care task?</p>
    
    <div class="mt-3">
      <p><strong>Task:</strong> {{ object.task|title }}</p>
      <p><strong>Plant:</strong> {{ object.plant.nickname }}</p>
      <p><strong>Due:</strong> {{ object.due|date:"M d, Y" }}</p>
    </div>

    <form method="POST" class="mt-4">
      {% csrf_token %}
      <button type="submit" class="button-destructive">Delete</button>
      <a href="{% url 'task_detail' object.pk %}" class="button-secondary">Cancel</a>
    </form>

  </div>

</div>

{% endblock %}
